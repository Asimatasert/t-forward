function renderTunnel(el) {
  const t = tunnels.find((x) => x.id === selected);
  if (!t) { el.innerHTML = ""; return; }
  const pill = { on: "● CONNECTED", off: "IDLE", waiting: "● AWAITING CODE", failed: "● FAILED" }[t.state];
  // Action buttons carry only a static data-act; the id is bound in a closure
  // when listeners are attached below, so no data ever lands in an inline
  // handler (avoids attribute/JS-string breakout via crafted ids).
  let actions = "";
  if (t.state === "on") actions = `<button class="btn danger-ghost" data-act="down">Down</button>`;
  else if (t.state === "off") actions = `<button class="btn primary" data-act="up">Up</button>`;
  else if (t.state === "failed") actions = `<button class="btn primary" data-act="up">Retry</button>
    <button class="btn danger-ghost" data-act="down">Clear</button>`;
  else actions = `<button class="btn danger-ghost" data-act="down">Abort</button>`;

  const badges = [
    t.totp ? '<span class="badge totp">TOTP</span>' : "",
    t.restart ? '<span class="badge restart">RESTART unless-stopped</span>' : "",
    t.socks ? `<span class="badge socks">SOCKS ${esc((t.socks.split(":")[1]) || "")}</span>` : "",
  ].join(" ");

  let mid = "";
  if (t.state === "waiting") mid = `
    <div class="sec">Verification</div>
    <div class="code-entry">
      <div class="hint pulse">Code arrives via SMS / mail / Telegram — usually 10–30 s</div>
      <div class="code-row">
        <input class="code-input" inputmode="numeric" maxlength="8" placeholder="······"
               aria-label="Verification code" data-code-input>
        <button class="btn primary" data-act="code">Send</button>
      </div>
    </div>`;
  if (t.state === "failed") mid = `
    <div class="sec">Last state</div>
    <div class="fail-box"><div class="t">exited — see events / logs</div>
      <pre>run  t-forward logs ${esc(t.id)}  for the tail</pre></div>`;

  const chart = t.state === "on" ? `
    <div class="sec">Throughput — last 90 s</div>
    <div class="chart-box">
      <div class="chart-legend">
        <span><span class="sw" style="background:var(--tx)"></span>TX upload</span>
        <span><span class="sw" style="background:var(--rx)"></span>RX download</span>
      </div>
      <div class="chart-wrap">
        <canvas id="spark" width="300" height="110" style="width:100%; height:110px"></canvas>
        <div class="chart-tip" id="chart-tip"></div>
      </div>
    </div>` : "";

  // copyVals/goVals hold the strings buttons act on, referenced by numeric
  // index so no conf-derived value is ever placed in an inline handler.
  const copyVals = [];
  const goVals = [];
  const fwdEdits = [];
  const ports = (t.forwards.length || t.socks) ? `
    <div class="sec">Published ports</div>
    <div class="ports">
      ${t.forwards.map((f) => {
        const cidx = copyVals.push(connString(f)) - 1;
        const uri = connURI(f);
        const gidx = uri ? goVals.push(uri) - 1 : -1;
        const fidx = fwdEdits.push([f.remote, f.note || ""]) - 1;
        const note = f.note ? ` · <span style="color:var(--copper)">${esc(f.note)}</span>` : "";
        return `
        <div class="port-row">
          ${f.service ? `<span class="svc">(${esc(f.service)})</span>` : ""}
          <span>${esc(f.local)}</span><span class="arrow">→</span><span>${esc(f.remote)}${note}</span>
          <button class="copy" data-copy="${cidx}" title="${esc(connString(f))}">copy</button>
          ${gidx >= 0 ? `<button class="go" data-go="${gidx}" title="open ${esc(uri)}">→</button>` : ""}
          <button class="edit" data-editfwd="${fidx}" title="Edit note">✎</button>
        </div>`;
      }).join("")}
      ${t.socks ? (() => {
        const cidx = copyVals.push("socks5h://" + t.socks) - 1;
        return `
        <div class="port-row">
          <span>${esc(t.socks)}</span><span class="arrow">→</span><span>far side (any host)</span>
          <span class="kind">socks5</span>
          <button class="copy" data-copy="${cidx}">copy</button>
        </div>`;
      })() : ""}
    </div>` : "";

  // who reached YOU on this tunnel's ports (host-side observation)
  const clients = (t.state === "on" && Array.isArray(t.clients)) ? t.clients : [];
  const clientsHtml = clients.length ? `
    <div class="sec">Clients — reached YOU</div>
    <div class="ports">
      ${clients.map((c) => `
        <div class="port-row">
          <span>${esc(c.ip === "127.0.0.1" ? "localhost" : c.ip)}</span>
          <span class="kind">${esc(c.proc || c.mac || "")} :${esc(String(c.port))}</span>
        </div>`).join("")}
    </div>` : "";

  // multi-hop ssh: show the ProxyJump chain  you → hop1 → … → landing → targets.
  // Forwards resolve from the landing host (SSH_HOST), the last node in the chain.
  const jumpHtml = (t.type === "ssh" && (t.sshJump || []).length) ? (() => {
    const chain = ["you", ...t.sshJump, t.sshHost].filter(Boolean);
    const hops = chain.map((h, i) => {
      const label = h === "you" ? "YOU" : esc(h);
      const cls = i === 0 ? "var(--copper)" : i === chain.length - 1 ? "var(--steel)" : "var(--text)";
      return `<span style="color:${cls}">${label}</span>`;
    }).join(`<span style="color:var(--faint)"> → </span>`);
    return `<div class="sec">Jump route (ssh -J)</div>
      <div class="chart-box" style="font-family:var(--mono);font-size:11px;line-height:1.9">
        ${hops}
        <div class="desc" style="margin-top:6px">forwards below reach hosts as seen from <b style="color:var(--steel)">${esc(t.sshHost)}</b> (the last hop)</div>
      </div>`;
  })() : "";

  // type only ever drives a CSS class from a fixed whitelist; anything else
  // gets no class (never interpolated raw into the attribute).
  const typeClass = ["vpn", "ssh", "local"].includes(t.type) ? t.type : "";
  el.innerHTML = `
    <h1>${esc(t.id)} <span class="type-tag ${typeClass}">${esc(String(t.type || "").toUpperCase())}</span></h1>
    <p class="desc">${esc(t.desc || "(no name)")} <button class="edit" data-edit="name" title="Edit name">✎</button></p>
    <span class="pill ${t.state} ${t.state === "waiting" ? "pulse" : ""}">${pill}</span>
    <div class="panel-actions">${actions}</div>
    ${badges.trim() ? `<div class="sec">Flags</div><div class="badges">${badges}</div>` : ""}
    <div class="sec">Tags <button class="edit" data-edit="tags" title="Edit tags">✎</button></div>
    <div class="ptags">${(t.tags || []).map((x) => `<span class="ptag">#${esc(x)}</span>`).join("") || `<span class="desc">none</span>`}</div>
    ${t.state === "on" && t.tunIP ? `
      <div class="sec">On the VPN</div>
      <div class="ports">
        <div class="port-row"><span>our IP</span><span class="kind" style="color:var(--steel)">${esc(t.tunIP)}</span></div>
        ${t.tunSubnet ? `<div class="port-row"><span>subnet</span><span class="kind">${esc(t.tunSubnet)}</span><span class="desc" style="margin-left:6px">hosts here can talk directly</span></div>` : ""}
      </div>` : ""}
    ${jumpHtml}
    ${mid}${chart}${ports}${clientsHtml}`;

  // Wire handlers via addEventListener with the id/values captured in closures,
  // so nothing conf-derived is ever parsed as HTML/JS.
  el.querySelectorAll("[data-act]").forEach((b) => {
    b.addEventListener("click", () => {
      const a = b.dataset.act;
      if (a === "up") actUp(t.id);
      else if (a === "down") actDown(t.id);
      else if (a === "code") actCode(t.id);
    });
  });
  el.querySelectorAll("[data-edit]").forEach((b) => {
    b.addEventListener("click", () => {
      if (b.dataset.edit === "name") editName(t.id);
      else if (b.dataset.edit === "tags") editTags(t.id);
    });
  });
  el.querySelectorAll("[data-editfwd]").forEach((b) => {
    b.addEventListener("click", () => {
      const [remote, cur] = fwdEdits[+b.dataset.editfwd];
      editFwdNote(t.id, remote, cur);
    });
  });
  el.querySelectorAll("[data-copy]").forEach((b) => {
    b.addEventListener("click", () => copyText(copyVals[+b.dataset.copy]));
  });
  el.querySelectorAll("[data-go]").forEach((b) => {
    b.addEventListener("click", () => openURI(goVals[+b.dataset.go]));
  });
  const codeInput = el.querySelector("[data-code-input]");
  if (codeInput) {
    codeInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") actCode(t.id);
    });
  }
  bindChartHover();
}

// ---- right panel: a single target HOST behind a tunnel ----
function renderHost(el, tunId, host) {
  const t = tunnels.find((x) => x.id === tunId);
  if (!t) { sel = { kind: "tunnel" }; return renderTunnel(el); }
  const fwds = (t.forwards || []).filter((f) => f.remote.split(":")[0] === host);
  const reach = (t.hostUp && Object.prototype.hasOwnProperty.call(t.hostUp, host)) ? t.hostUp[host] : null;
  const note = (t.hostNotes && t.hostNotes[host]) || "";
  const reachPill = reach === true ? `<span class="pill on">● REACHABLE</span>`
    : reach === false ? `<span class="pill failed">● UNREACHABLE</span>`
    : `<span class="pill off">? UNKNOWN</span>`;
  const copyVals = [], goVals = [], fwdEdits = [];
  const portsHtml = fwds.length ? `
    <div class="sec">Ports on this host</div>
    <div class="ports">
      ${fwds.map((f) => {
        const cidx = copyVals.push(connString(f)) - 1;
        const uri = connURI(f);
        const gidx = uri ? goVals.push(uri) - 1 : -1;
        const fidx = fwdEdits.push([f.remote, f.note || ""]) - 1;
        const fnote = f.note ? ` · <span style="color:var(--copper)">${esc(f.note)}</span>` : "";
        return `
        <div class="port-row">
          ${f.service ? `<span class="svc">(${esc(f.service)})</span>` : ""}
          <span>${esc(f.local)}</span><span class="arrow">→</span><span>:${esc(f.remote.split(":")[1])}${fnote}</span>
          <button class="copy" data-copy="${cidx}" title="${esc(connString(f))}">copy</button>
          ${gidx >= 0 ? `<button class="go" data-go="${gidx}" title="open ${esc(uri)}">→</button>` : ""}
          <button class="edit" data-editfwd="${fidx}" title="Edit note">✎</button>
        </div>`;
      }).join("")}
    </div>` : `<p class="desc">no forwards to this host</p>`;
  const hTags = (t.hostTags && t.hostTags[host]) || [];
  const hostSub = (t.hostSubnets && t.hostSubnets[host]) || "";
  const sameSubnet = hostSub && t.tunSubnet && hostSub === t.tunSubnet;
  const subnetHtml = hostSub ? `
    <div class="sec">Subnet</div>
    <div class="ports">
      <div class="port-row"><span>${esc(hostSub)}</span>
        <span class="kind" style="color:${sameSubnet ? "var(--ok)" : "var(--faint)"}">${sameSubnet ? "same as your VPN IP — direct" : "different subnet"}</span></div>
      ${t.tunIP ? `<div class="port-row"><span>your VPN IP</span><span class="kind" style="color:var(--steel)">${esc(t.tunIP)}</span></div>` : ""}
    </div>` : "";
  el.innerHTML = `
    <h1>${esc(host)} <span class="type-tag">HOST</span></h1>
    <p class="desc" style="color:var(--copper)">${esc(note || "(no name)")} <button class="edit" data-edit="hnote" title="Edit name/note">✎</button></p>
    <p class="desc">behind <b style="color:var(--text)">${esc(t.id)}</b> · ${esc(t.type)}${t.state === "on" ? "" : " (tunnel down)"}</p>
    ${reachPill}
    <div class="sec">Tags <button class="edit" data-edit="htags" title="Edit host tags">✎</button></div>
    <div class="ptags">${hTags.map((x) => `<span class="ptag">#${esc(x)}</span>`).join("") || `<span class="desc">none</span>`}</div>
    <div class="sec">Reachability (ping via tunnel)</div>
    <p class="desc">${reach === null ? "checked once the tunnel is up" : reach ? "responds through the tunnel" : "no ping reply through the tunnel"}</p>
    ${subnetHtml}
    ${portsHtml}`;
  el.querySelectorAll("[data-copy]").forEach((b) => b.addEventListener("click", () => copyText(copyVals[+b.dataset.copy])));
  el.querySelectorAll("[data-go]").forEach((b) => b.addEventListener("click", () => openURI(goVals[+b.dataset.go])));
  el.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => {
    if (b.dataset.edit === "hnote") editHostNote(t.id, host);
    else if (b.dataset.edit === "htags") editHostTags(t.id, host);
  }));
  el.querySelectorAll("[data-editfwd]").forEach((b) => b.addEventListener("click", () => {
    const [remote, cur] = fwdEdits[+b.dataset.editfwd];
    editFwdNote(t.id, remote, cur);
  }));
}

// ---- right panel: a virtual VPN subnet (a segment hosts share) ----
function renderSubnet(el, tunId, cidr) {
  const t = tunnels.find((x) => x.id === tunId);
  if (!t) { sel = { kind: "tunnel" }; return renderTunnel(el); }
  const note = (t.subnetNotes && t.subnetNotes[cidr]) || "";
  const tags = (t.subnetTags && t.subnetTags[cidr]) || [];
  const ourHere = t.tunSubnet === cidr && t.tunIP;
  // member hosts: those the tunnel currently places in this subnet
  const members = Object.keys(t.hostSubnets || {}).filter((ip) => t.hostSubnets[ip] === cidr);
  const memberHtml = members.length ? `
    <div class="sec">Hosts on this segment</div>
    <div class="ports">
      ${members.map((ip) => {
        const nm = (t.hostNotes && t.hostNotes[ip]) || "";
        const reach = (t.hostUp && Object.prototype.hasOwnProperty.call(t.hostUp, ip)) ? t.hostUp[ip] : null;
        const dot = reach === true ? "var(--ok)" : reach === false ? "var(--danger)" : "var(--faint)";
        return `<div class="port-row" data-host="${esc(ip)}" style="cursor:pointer">
          <span style="color:${dot}">●</span>
          <span>${esc(ip)}</span>
          ${nm ? `<span style="color:var(--copper)">${esc(nm)}</span>` : ""}
          <span class="kind">inspect →</span>
        </div>`;
      }).join("")}
    </div>` : `<p class="desc">no hosts detected in this subnet yet</p>`;
  el.innerHTML = `
    <h1>${esc(cidr)} <span class="type-tag ssh">SUBNET</span></h1>
    <p class="desc" style="color:var(--copper)">${esc(note || "(no label)")} <button class="edit" data-edit="snote" title="Edit label">✎</button></p>
    <p class="desc">a virtual segment behind <b style="color:var(--text)">${esc(t.id)}</b> — everything here reaches everything here directly (no forward needed)</p>
    <div class="sec">Tags <button class="edit" data-edit="stags" title="Edit subnet tags">✎</button></div>
    <div class="ptags">${tags.map((x) => `<span class="ptag">#${esc(x)}</span>`).join("") || `<span class="desc">none</span>`}</div>
    <div class="sec">On the VPN</div>
    <div class="ports">
      ${ourHere ? `<div class="port-row"><span>your VPN IP</span><span class="kind" style="color:var(--steel)">${esc(t.tunIP)}</span><span class="desc" style="margin-left:6px">you're on this segment</span></div>` : `<div class="port-row"><span>your VPN IP</span><span class="kind">${esc(t.tunIP || "—")}</span><span class="desc" style="margin-left:6px">different segment</span></div>`}
      <div class="port-row"><span>members</span><span class="kind">${members.length}</span></div>
    </div>
    ${memberHtml}`;
  el.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click", () => {
    if (b.dataset.edit === "snote") editSubnetNote(t.id, cidr);
    else if (b.dataset.edit === "stags") editSubnetTags(t.id, cidr);
  }));
  el.querySelectorAll("[data-host]").forEach((r) => r.addEventListener("click", () => {
    sel = { kind: "host", tun: t.id, host: r.dataset.host }; renderPanel();
  }));
}

// ---- right panel: this machine (aggregate) ----
function renderYou(el) {
  const on = tunnels.filter((t) => t.state === "on");
  const tx = tunnels.reduce((s, t) => s + ((t.rate && t.rate.tx) || 0), 0);
  const rx = tunnels.reduce((s, t) => s + ((t.rate && t.rate.rx) || 0), 0);
  const fwdCount = on.reduce((s, t) => s + ((t.forwards || []).length), 0);
  const cliCount = on.reduce((s, t) => s + ((t.clients || []).length), 0);
  const stat = (k, v) => `<div class="port-row"><span>${k}</span><span class="kind">${esc(String(v))}</span></div>`;
  const rows = on.map((t) => `
    <div class="port-row">
      <span style="color:var(--ok)">●</span><span>${esc(t.id)}</span>
      <span class="kind">↑${fmtRate((t.rate && t.rate.tx) || 0)} ↓${fmtRate((t.rate && t.rate.rx) || 0)} · ${(t.forwards || []).length} fwd</span>
    </div>`).join("") || `<p class="desc">no active tunnels</p>`;
  el.innerHTML = `
    <h1>YOU <span class="type-tag">THIS MACHINE</span></h1>
    <p class="desc">reach every forward at <b style="color:var(--text)">${esc(pubHost())}</b></p>
    <div class="sec">Totals</div>
    <div class="ports">
      ${stat("Active tunnels", on.length)}
      ${stat("Published forwards", fwdCount)}
      ${stat("Live clients", cliCount)}
      ${stat("TX / RX", fmtRate(tx) + " / " + fmtRate(rx))}
    </div>
    <div class="sec">Active tunnels</div>
    <div class="ports">${rows}</div>`;
}

/* -------------------- side chart (rolling area, 2 series, tooltip) */
let chartHover = null;
function bindChartHover() {
  const c = document.getElementById("spark");
  if (!c) { chartHover = null; return; }
  c.addEventListener("mousemove", (ev) => {
    const r = c.getBoundingClientRect();
    chartHover = { x: ev.clientX - r.left, w: r.width };
  });
  c.addEventListener("mouseleave", () => {
    chartHover = null;
    const tip = document.getElementById("chart-tip");
    if (tip) tip.style.display = "none";
  });
}
function drawChart() {
  const c = document.getElementById("spark");
  if (!c) return;
  const t = tunnels.find((x) => x.id === selected);
  if (!t || t.state !== "on") return;
  const wCss = c.clientWidth || 300, hCss = 110;
  if (c.width !== wCss * DPR) { c.width = wCss * DPR; c.height = hCss * DPR; }
  const g = c.getContext("2d");
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  g.clearRect(0, 0, wCss, hCss);

  const PAD_L = 6, PAD_R = 48, PAD_T = 8, PAD_B = 6;
  const W = wCss - PAD_L - PAD_R, H = hCss - PAD_T - PAD_B;
  const max = Math.max(20, ...t.hist.tx, ...t.hist.rx) * 1.15;

  g.strokeStyle = "rgba(42,51,64,0.5)";
  g.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const gy = PAD_T + (H * i) / 3;
    g.beginPath(); g.moveTo(PAD_L, gy); g.lineTo(PAD_L + W, gy); g.stroke();
  }

  [["rx", T.rx], ["tx", T.tx]].forEach(([s, color]) => {
    const data = t.hist[s];
    const px = (i) => PAD_L + (W * i) / (HIST - 1);
    const py = (v) => PAD_T + H - (H * v) / max;
    g.beginPath();
    g.moveTo(px(0), py(data[0]));
    data.forEach((v, i) => g.lineTo(px(i), py(v)));
    g.lineTo(px(HIST - 1), PAD_T + H); g.lineTo(px(0), PAD_T + H);
    g.closePath();
    g.fillStyle = color + "22"; g.fill();
    g.beginPath();
    data.forEach((v, i) => i ? g.lineTo(px(i), py(v)) : g.moveTo(px(i), py(v)));
    g.strokeStyle = color; g.lineWidth = 2; g.lineJoin = "round"; g.stroke();
    const lastV = data[HIST - 1];
    g.beginPath(); g.arc(px(HIST - 1), py(lastV), 3, 0, 7);
    g.fillStyle = color; g.fill();
    g.strokeStyle = T.raise; g.lineWidth = 2; g.stroke();
    g.font = `10px ${MONO}`; g.fillStyle = T.dim;
    g.textAlign = "left"; g.textBaseline = "middle";
    g.fillText(fmtRate(lastV), px(HIST - 1) + 8, py(lastV));
  });

  const tip = document.getElementById("chart-tip");
  if (chartHover && tip) {
    const i = Math.max(0, Math.min(HIST - 1, Math.round(((chartHover.x - PAD_L) / W) * (HIST - 1))));
    const hx = PAD_L + (W * i) / (HIST - 1);
    g.strokeStyle = T.faint; g.lineWidth = 1; g.setLineDash([3, 3]);
    g.beginPath(); g.moveTo(hx, PAD_T); g.lineTo(hx, PAD_T + H); g.stroke();
    g.setLineDash([]);
    tip.style.display = "block";
    tip.style.left = Math.min(hx + 10, wCss - 140) + "px";
    tip.style.top = "6px";
    tip.innerHTML = `t−${HIST - 1 - i}s · TX <span class="v">${fmtRate(t.hist.tx[i])}</span> · RX <span class="v">${fmtRate(t.hist.rx[i])}</span>`;
  }
}

/* ============================================================== misc */
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

function copyText(s) {
  if (navigator.clipboard) navigator.clipboard.writeText(s).then(() => toast("copied " + s), () => toast(s));
  else toast(s);
}

// Connection strings target the host you reached the panel through (so a remote
// panel gives a reachable address, not this browser's localhost) on the
// forward's (real, resolved) local port.
function localPort(f) { return (f.local || "").split(":").pop(); }
function pubHost() { return location.hostname || "127.0.0.1"; }

// service-aware connection string the copy button puts on the clipboard
function connString(f) {
  const L = localPort(f), H = pubHost(), u = f.user || "user";
  switch (f.service) {
    case "ssh":       return `ssh -p ${L} ${u}@${H}`;
    case "sftp":      return `sftp -P ${L} ${u}@${H}`;
    case "telnet":    return `telnet ${H} ${L}`;
    case "http": case "http-alt": case "http-dev":
    case "kibana": case "elastic": case "rabbitmq":
                      return `http://${H}:${L}`;
    case "https":     return `https://${H}:${L}`;
    case "postgres":  return `psql -h ${H} -p ${L} -U ${u}`;
    case "mysql":     return `mysql -h ${H} -P ${L} -u ${u} -p`;
    case "mssql":     return `sqlcmd -S ${H},${L} -U ${u}`;
    case "oracle":    return `sqlplus ${u}@${H}:${L}`;
    case "mongodb":   return `mongosh "mongodb://${H}:${L}"`;
    case "redis":     return `redis-cli -h ${H} -p ${L}`;
    case "memcached": return `telnet ${H} ${L}`;
    case "vnc":       return `vnc://${H}:${L}`;
    case "rdp":       return `${H}:${L}`;
    case "smb":       return `smb://${H}:${L}`;
    case "ftp":       return `ftp://${H}:${L}`;
    case "ldap":      return `ldap://${H}:${L}`;
    case "amqp":      return `amqp://${H}:${L}`;
    default:          return `${H}:${L}`;
  }
}

// a launchable URI for the "→" button, or null for CLI-only services
function connURI(f) {
  const L = localPort(f), H = pubHost();
  switch (f.service) {
    case "http": case "http-alt": case "http-dev":
    case "kibana": case "elastic": case "rabbitmq":
                    return `http://${H}:${L}`;
    case "https":   return `https://${H}:${L}`;
    case "vnc":     return `vnc://${H}:${L}`;
    case "rdp":     return `rdp://${H}:${L}`;
    case "smb":     return `smb://${H}:${L}`;
    case "ftp":     return `ftp://${H}:${L}`;
    default:        return null;
  }
}

function openURI(uri) {
  if (!uri) return;
  // http(s) opens a tab; custom schemes hand off to the OS protocol handler
  if (uri.startsWith("http://") || uri.startsWith("https://")) window.open(uri, "_blank", "noopener");
  else window.location.href = uri;
  toast("opening " + uri);
}

/* ======================================================= live wiring (SSE) */
const TOKEN = new URLSearchParams(location.search).get("token") || "";
// Scrub the token from the address bar and history immediately after reading it,
// so it cannot leak via bookmarks, the back/forward cache, or a Referer header.
// The value survives only in this in-memory constant; SSE still needs it as a
// query param (EventSource cannot set headers), but the persisted URL is clean.
try {
  if (TOKEN && location.search) {
    const u = new URL(location.href);
    u.searchParams.delete("token");
    history.replaceState(null, "", u.pathname + u.search + u.hash);
  }
} catch (e) { /* replaceState unavailable (e.g. file://); ignore */ }
const withTok = (p) => p + (p.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(TOKEN);

// POST an action to the daemon; body is JSON. Shows a toast with the outcome.
async function action(path, body, okMsg) {
  try {
    const r = await fetch(withTok(path), {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Token": TOKEN },
      body: JSON.stringify(body || {}),
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok !== false) { if (okMsg !== null) toast(okMsg || "ok"); return true; }
    toast("failed: " + (j.error || r.status));
    return false;
  } catch (e) {
    toast("request failed: " + e.message);
    return false;
  }
}
// re-pull state a few times after an action so transitions (idle→waiting→on)
// show quickly even when the SSE stream is blocked (e.g. by a proxy)
function afterAct() { [300, 1200, 3000, 6000].forEach((ms) => setTimeout(pullState, ms)); }
function actUp(id)   { action("/up",   { name: id }, `bringing up ${id}…`).then(afterAct); }
function actDown(id) { action("/down", { name: id }, `disconnecting ${id}…`).then(afterAct); }
function actDownAll(){ action("/down", { name: "all" }, "disconnecting all…").then(afterAct); }
function actCode(id) {
  const el = document.querySelector(".code-input");
  const code = el ? el.value.trim() : "";
  if (!code) { toast("enter the code first"); return; }
  action("/code", { name: id, code }, `code sent to ${id}…`).then(afterAct);
}
// ---- top-level view switch (two separate canvases) ----
function setView(v) {
  view = v;
  document.querySelectorAll(".vbtn").forEach((b) => b.classList.toggle("active", b.dataset.view === v));
  // the tunnel-type rail belongs to the tunnel canvas only; the event console is
  // shared (it also carries LAN scan events)
  document.getElementById("tabrail").style.display = v === "lan" ? "none" : "";
  document.getElementById("topbtn-primary").textContent = v === "lan" ? "Rescan" : "New tunnel";
  if (v === "lan") {
    if (sel.kind !== "device") sel = { kind: "lan" };
  } else if (sel.kind === "device" || sel.kind === "lan") {
    sel = { kind: "tunnel" };
  }
  renderTagbar(); layout(); renderPanel();
}
function topPrimary() {
  if (view === "lan") actRescan();
  else toast("New tunnel: drop a YAML into conf.d/");
}

// ---- LAN discovery actions ----
function actRescan(iface) {
  scan.scanning = true; updateLanBar();
  action("/scan/rescan", iface ? { iface } : {}, iface ? `rescanning ${iface}…` : "scanning the network…");
}
function editDeviceName(dev) {
  const v = prompt("Name for " + (dev.mac || dev.ip), dev.name || "");
  if (v === null) return;
  action("/scan/device", { id: deviceKey(dev), name: v.trim() }, "device name saved");
}
function editDeviceTags(dev) {
  const v = prompt("Tags for " + (dev.mac || dev.ip) + " (space-separated)", (dev.tags || []).join(" "));
  if (v === null) return;
  action("/scan/device", { id: deviceKey(dev), tags: v.split(/\s+/).filter(Boolean) }, "device tags saved");
}
function actForward(ip, port, iface) {
  action("/scan/forward", { ip, port: String(port), iface: iface || "" }, `forwarding ${ip}:${port} (any)…`);
}
// forward every not-yet-forwarded open port on a device (each becomes its own
// local relay); staggered so we don't fire a burst of identical requests
async function actForwardAll(ip, ports, iface) {
  const todo = ports.filter((p) => !isForwarded(ip, String(p)));
  if (!todo.length) { toast("all ports already forwarded"); return; }
  toast(`forwarding ${todo.length} ports on ${ip}…`);
  for (const p of todo) {
    await action("/scan/forward", { ip, port: String(p), iface: iface || "" }, null);
  }
  toast(`forwarded ${todo.length} ports on ${ip}`);
}

// ---- inline conf editing (non-sensitive fields only; POST /conf/<name>) ----
async function editConf(name, body, okMsg) {
  return action("/conf/" + encodeURIComponent(name), body, okMsg || "saved");
}
function editName(id) {
  const t = tunnels.find((x) => x.id === id); if (!t) return;
  const v = prompt("Tunnel name", t.desc || "");
  if (v === null) return;
  editConf(id, { name: v.trim() }, "name updated");
}
function editTags(id) {
  const t = tunnels.find((x) => x.id === id); if (!t) return;
  const v = prompt("Tags (space-separated)", (t.tags || []).join(" "));
  if (v === null) return;
  editConf(id, { tags: v.split(/\s+/).filter(Boolean) }, "tags updated");
}
function editHostNote(id, host) {
  const t = tunnels.find((x) => x.id === id); if (!t) return;
  const cur = (t.hostNotes && t.hostNotes[host]) || "";
  const v = prompt("Name / note for " + host, cur);
  if (v === null) return;
  editConf(id, { hosts: { [host]: { note: v.trim() } } }, "host note updated");
}
function editHostTags(id, host) {
  const t = tunnels.find((x) => x.id === id); if (!t) return;
  const cur = (t.hostTags && t.hostTags[host]) || [];
  const v = prompt("Tags for " + host + " (space-separated)", cur.join(" "));
  if (v === null) return;
  editConf(id, { hosts: { [host]: { tags: v.split(/\s+/).filter(Boolean) } } }, "host tags updated");
}
function editFwdNote(id, remote, cur) {
  const v = prompt("Note for forward → " + remote, cur || "");
  if (v === null) return;
  editConf(id, { forwards: { [remote]: v.trim() } }, "forward note updated");
}
function editSubnetNote(id, cidr) {
  const t = tunnels.find((x) => x.id === id); if (!t) return;
  const cur = (t.subnetNotes && t.subnetNotes[cidr]) || "";
  const v = prompt("Label for subnet " + cidr, cur);
  if (v === null) return;
  editConf(id, { subnets: { [cidr]: { note: v.trim() } } }, "subnet label updated");
}
function editSubnetTags(id, cidr) {
  const t = tunnels.find((x) => x.id === id); if (!t) return;
  const cur = (t.subnetTags && t.subnetTags[cidr]) || [];
  const v = prompt("Tags for subnet " + cidr + " (space-separated)", cur.join(" "));
  if (v === null) return;
  editConf(id, { subnets: { [cidr]: { tags: v.split(/\s+/).filter(Boolean) } } }, "subnet tags updated");
}

// upsert daemon state snapshot into the local tunnels array, preserving history
function applyState(list) {
  const byId = {};
  tunnels.forEach((t) => (byId[t.id] = t));
  const next = list.map((s) => {
    const t = byId[s.id] || {};
    if (!t.hist) initHist(t);
    Object.assign(t, {
      id: s.id, type: s.type, desc: s.desc || s.id,
      state: mapState(s.state),
      tags: s.tags || [], forwards: s.forwards || [],
      socks: s.socks || null, restart: !!s.restart, totp: !!s.totp,
      proto: s.proto || "", server: s.server || "",
      sshHost: s.sshHost || "", user: s.user || "", sshJump: s.sshJump || [],
      hostNotes: s.hostNotes || {}, hostTags: s.hostTags || {},
      subnetNotes: s.subnetNotes || {}, subnetTags: s.subnetTags || {},
      container: "tf-" + s.id,
      lan: (s.forwards || []).some((f) => (f.local || "").startsWith("0.0.0.0")),
    });
    // live fields — also delivered via SSE, but folded into /state so a
    // polling-only panel (SSE blocked, e.g. by an HTTP proxy) still shows
    // throughput, reachability, subnet and clients
    if (t.state === "on") {
      t.rate = { tx: Number(s.txRate) || 0, rx: Number(s.rxRate) || 0 };
      if (s.hostUp) t.hostUp = s.hostUp;
      if (s.tunIP) t.tunIP = s.tunIP;
      if (s.tunSubnet) t.tunSubnet = s.tunSubnet;
      if (s.hostSubnets) t.hostSubnets = s.hostSubnets;
      if (s.clients) t.clients = s.clients;
    }
    // netinfo (VPN IP / subnet) is only meaningful while connected — drop it
    // when the tunnel isn't up so the map/panel don't show a stale segment
    if (t.state !== "on") { t.tunIP = ""; t.tunSubnet = ""; t.hostSubnets = {}; }
    return t;
  });
  tunnels = next;
  if (!tunnels.some((t) => t.id === selected) && tunnels.length) { selected = tunnels[0].id; sel = { kind: "tunnel" }; }
  // if a selected host's forwards vanished, fall back to the tunnel view
  if (sel.kind === "host") {
    const t = tunnels.find((x) => x.id === sel.tun);
    if (!t || !(t.forwards || []).some((f) => f.remote.split(":")[0] === sel.host)) sel = { kind: "tunnel" };
  }
  renderTabs(); renderTagbar(); layout(); renderPanel();
}

function applyStat(s) {
  const t = tunnels.find((x) => x.id === s.id);
  if (!t) return;
  if (!t.hist) initHist(t);
  t.rate = { tx: Number(s.txRate) || 0, rx: Number(s.rxRate) || 0 };
}

// Pull the full state over plain HTTP. The panel used to rely ENTIRELY on the
// SSE stream for state, so if that stream was slow to open (or blocked), the
// panel stayed blank. This fetch guarantees the tunnels/ports show up, and a
// poll below keeps them current whenever SSE goes quiet.
let lastStateAt = 0;
async function pullState() {
  try {
    const r = await fetch(withTok("/state"), { headers: { "X-Token": TOKEN } });
    if (!r.ok) return;
    applyState(await r.json());
    lastStateAt = Date.now();
  } catch (e) { /* offline; the poll retries */ }
}

let es = null;
function connectSSE() {
  es = new EventSource(withTok("/events"));
  es.addEventListener("state", (e) => { try { applyState(JSON.parse(e.data)); lastStateAt = Date.now(); } catch {} });
  es.addEventListener("stat",  (e) => { try { applyStat(JSON.parse(e.data)); } catch {} });
  es.addEventListener("event", (e) => {
    try { const d = JSON.parse(e.data); pushEvent(d.level || "log", d.tun || "", d.msg || ""); } catch {}
  });
  es.addEventListener("clients", (e) => {
    try {
      const d = JSON.parse(e.data);
      const t = tunnels.find((x) => x.id === d.tun);
      if (t) t.clients = d.clients || [];
    } catch {}
  });
  es.addEventListener("hosts", (e) => {
    try {
      const d = JSON.parse(e.data);
      const t = tunnels.find((x) => x.id === d.tun);
      if (t) t.hostUp = d.up || {};
    } catch {}
  });
  es.addEventListener("netinfo", (e) => {
    try {
      const d = JSON.parse(e.data);
      const t = tunnels.find((x) => x.id === d.tun);
      if (t) { t.tunIP = d.ip || ""; t.tunSubnet = d.subnet || ""; t.hostSubnets = d.hostSubnets || {}; }
    } catch {}
  });
  es.addEventListener("waiting", (e) => {
    try {
      const d = JSON.parse(e.data);
      const t = tunnels.find((x) => x.id === d.tun);
      if (t && t.state !== "waiting") { t.state = "waiting"; renderTabs(); renderPanel(); }
    } catch {}
  });
  es.addEventListener("scan", (e) => {
    try {
      scan = JSON.parse(e.data) || scan;
      scan.interfaces = scan.interfaces || [];
      if (view === "lan") { updateLanBar(); layout(); renderPanel(); }
    } catch {}
  });
  es.onerror = () => { /* EventSource auto-reconnects; nothing to do */ };
}

window.addEventListener("resize", layout);
setInterval(rollHist, 1000);
rollHist();
document.querySelectorAll(".vbtn").forEach((b) => b.addEventListener("click", () => setView(b.dataset.view)));
document.querySelector('.vbtn[data-view="map"]').classList.add("active");
renderTabs();
renderTagbar();
layout();
renderPanel();
connectSSE();
pullState();   // populate immediately over HTTP, independent of the SSE stream
// fall back to polling whenever SSE hasn't delivered a state in a while (stream
// slow to open, blocked, or dropped) so the panel never sits stale/blank
setInterval(() => { if (Date.now() - lastStateAt > 8000) pullState(); }, 5000);
// pull the last discovery snapshot once (SSE only pushes on change)
fetch(withTok("/scan"), { headers: { "X-Token": TOKEN } })
  .then((r) => r.json())
  .then((d) => { scan = d || scan; scan.interfaces = scan.interfaces || []; if (view === "lan") { renderTagbar(); layout(); renderPanel(); } })
  .catch(() => {});
requestAnimationFrame(tick);
</script>
